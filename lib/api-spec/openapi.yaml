openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: pacengine
    description: PacEngine project + run management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /pacengine/projects:
    get:
      operationId: listProjects
      tags: [pacengine]
      summary: List available PacData projects
      description: Lists every PacData document discovered in the workspace examples directory.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"

  /pacengine/projects/{projectId}:
    get:
      operationId: getProject
      tags: [pacengine]
      summary: Load a project's parsed PacData
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetail"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pacengine/projects/import:
    post:
      operationId: importProject
      tags: [pacengine]
      summary: Import a PacData document by raw JSON (e.g. PacAI export)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportProjectRequest"
      responses:
        "200":
          description: Imported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportedProject"
        "400":
          description: Invalid PacData document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pacengine/projects/import-pacexport:
    post:
      operationId: importPacExport
      tags: [pacengine]
      summary: Import a .pacexport package (world.pacdata.json + optional visual_manifest.json)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportPacExportRequest"
      responses:
        "200":
          description: Imported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportedProject"
        "400":
          description: Invalid package
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pacengine/projects/{projectId}/runs:
    post:
      operationId: runProject
      tags: [pacengine]
      summary: Run the PacEngine deterministic loop and return the captured event log
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunRequest"
      responses:
        "200":
          description: Run completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunResult"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Engine failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pacengine/projects/{projectId}/determinism-check:
    post:
      operationId: determinismCheck
      tags: [pacengine]
      summary: Run the project twice and compare the captured event logs and traces
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunRequest"
      responses:
        "200":
          description: Comparison result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeterminismCheckResult"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Engine failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pacengine/templates:
    get:
      operationId: listTemplates
      tags: [pacengine]
      summary: List built-in project templates
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateListResponse"

  /pacengine/templates/{templateId}/instantiate:
    post:
      operationId: instantiateTemplate
      tags: [pacengine]
      summary: Create a new project from a template
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstantiateTemplateRequest"
      responses:
        "200":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportedProject"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pacengine/stats:
    get:
      operationId: getStats
      tags: [pacengine]
      summary: Workspace-wide aggregate stats (for the project browser hub)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceStats"

  /pacengine/engine-info:
    get:
      operationId: getEngineInfo
      tags: [pacengine]
      summary: Report engine binary status (built / not built / version)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngineInfo"

  /pacengine/runs/{runId}:
    get:
      operationId: getRun
      tags: [pacengine]
      summary: Fetch metadata for a previously executed run
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunMetadata"
        "404":
          description: Run not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pacengine/runs/{runId}/frames:
    get:
      operationId: getRunFrames
      tags: [pacengine]
      summary: Fetch a window of trace v2 frames for a run
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
        - name: from
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
        - name: to
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunFramesResponse"
        "404":
          description: Run not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pacengine/runs/{runId}/diff/{otherRunId}:
    get:
      operationId: diffRuns
      tags: [pacengine]
      summary: Diff two persisted runs frame-by-frame (trace v2 trace_diff)
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
        - name: otherRunId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraceDiffResponse"
        "404":
          description: One or both runs not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: string
      required: [error]

    ProjectSummary:
      type: object
      properties:
        id:
          type: string
          description: Filename-derived id, used in URLs
        name:
          type: string
          description: Human-readable filename without extension
        filename:
          type: string
        worldName:
          type: string
        pacdataVersion:
          type: string
        paccoreVersion:
          type: string
        entityCount:
          type: integer
        agentCount:
          type: integer
          description: Count of entities with type "agent"
        conflictSimEnabled:
          type: boolean
        scenarioCount:
          type: integer
        fileSizeBytes:
          type: integer
        modifiedAt:
          type: string
          format: date-time
        accentColor:
          type: string
          description: Deterministic accent color derived from project id (HSL string)
      required:
        - id
        - name
        - filename
        - worldName
        - pacdataVersion
        - paccoreVersion
        - entityCount
        - agentCount
        - conflictSimEnabled
        - scenarioCount
        - fileSizeBytes
        - modifiedAt
        - accentColor

    ProjectListResponse:
      type: object
      properties:
        projects:
          type: array
          items:
            $ref: "#/components/schemas/ProjectSummary"
      required: [projects]

    EntityDetail:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
      required: [id, type]

    ScenarioDetail:
      type: object
      properties:
        id:
          type: string
      required: [id]

    ConflictSimDetail:
      type: object
      properties:
        enabled:
          type: boolean
        scenarios:
          type: array
          items:
            $ref: "#/components/schemas/ScenarioDetail"
      required: [enabled, scenarios]

    ProjectDetail:
      type: object
      properties:
        summary:
          $ref: "#/components/schemas/ProjectSummary"
        entities:
          type: array
          items:
            $ref: "#/components/schemas/EntityDetail"
        conflictSim:
          $ref: "#/components/schemas/ConflictSimDetail"
        rawJson:
          type: string
        visualManifest:
          $ref: "#/components/schemas/VisualManifest"
          description: Present only when a visual_manifest.json sidecar exists for this project
      required: [summary, entities, conflictSim, rawJson]

    Template:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
          description: Grouping label (e.g. "Game", "Sandbox", "Simulation")
        tagline:
          type: string
        description:
          type: string
        entityCount:
          type: integer
        agentCount:
          type: integer
        scenarioCount:
          type: integer
        accentColor:
          type: string
      required:
        - id
        - name
        - category
        - tagline
        - description
        - entityCount
        - agentCount
        - scenarioCount
        - accentColor

    TemplateListResponse:
      type: object
      properties:
        templates:
          type: array
          items:
            $ref: "#/components/schemas/Template"
      required: [templates]

    # ── Visual Manifest sub-schemas ────────────────────────────────────────

    VisualEnvironment:
      type: object
      description: Atmospheric and sky settings for the scene.
      properties:
        sky_type:
          type: string
          enum: [physical, hdr_cubemap, procedural, simple]
          default: physical
        sun_direction:
          type: array
          items:
            type: number
            format: float
          minItems: 3
          maxItems: 3
        sun_intensity:
          type: number
          format: float
        sun_color:
          type: array
          items:
            type: number
            format: float
          minItems: 3
          maxItems: 3
        ambient_intensity:
          type: number
          format: float
        fog_enabled:
          type: boolean
        fog_density:
          type: number
          format: float
        fog_color:
          type: array
          items:
            type: number
            format: float
          minItems: 3
          maxItems: 3
        fog_height_falloff:
          type: number
          format: float

    VisualGI:
      type: object
      description: Global illumination settings.
      properties:
        gi_type:
          type: string
          enum: [none, probe_grid, voxel, hybrid]
          default: probe_grid
        probe_density:
          type: string
          enum: [low, medium, high]
          default: medium

    VisualPostProcessing:
      type: object
      description: Camera post-processing stack.
      properties:
        tonemap:
          type: string
          description: "aces | filmic | linear"
        exposure:
          type: number
          format: float
        bloom_intensity:
          type: number
          format: float
        contrast:
          type: number
          format: float
        saturation:
          type: number
          format: float

    VisualMaterialOverride:
      type: object
      description: PBR material channel overrides for a single material slot.
      properties:
        baseColorFactor:
          type: array
          items:
            type: number
            format: float
          minItems: 4
          maxItems: 4
        metallicFactor:
          type: number
          format: float
        roughnessFactor:
          type: number
          format: float

    VisualEntityRender:
      type: object
      description: Per-entity rendering configuration.
      required: [asset]
      properties:
        asset:
          type: string
          description: Relative path to glTF asset file
        material_overrides:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/VisualMaterialOverride"
          description: Material slot index (as string key) → override properties
        cast_shadows:
          type: boolean
        receive_shadows:
          type: boolean
        visible:
          type: boolean

    VisualEntityOverride:
      type: object
      description: Visual override for a single simulation entity.
      required: [id, render]
      properties:
        id:
          type: integer
          description: Entity slot index matching PacData entity order (0-based)
        render:
          $ref: "#/components/schemas/VisualEntityRender"

    VisualStaticMeshTransform:
      type: object
      description: World-space transform for a static mesh.
      properties:
        position:
          type: array
          items:
            type: number
            format: float
          minItems: 3
          maxItems: 3
        rotation:
          type: array
          items:
            type: number
            format: float
          minItems: 4
          maxItems: 4
          description: Quaternion (x, y, z, w)
        scale:
          type: array
          items:
            type: number
            format: float
          minItems: 3
          maxItems: 3

    VisualStaticMesh:
      type: object
      description: Non-simulated decorative mesh in the scene.
      required: [id, asset]
      properties:
        id:
          type: string
        asset:
          type: string
          description: Relative path to glTF asset file
        transform:
          $ref: "#/components/schemas/VisualStaticMeshTransform"
        material_intent:
          type: string
          description: "Semantic hint to the renderer (e.g. rock_rough, grass, concrete)"

    VisualLight:
      type: object
      description: A light placed in the scene.
      properties:
        type:
          type: string
          enum: [directional, point, spot]
        position:
          type: array
          items:
            type: number
            format: float
          minItems: 3
          maxItems: 3
        direction:
          type: array
          items:
            type: number
            format: float
          minItems: 3
          maxItems: 3
        color:
          type: array
          items:
            type: number
            format: float
          minItems: 3
          maxItems: 3
        intensity:
          type: number
          format: float
        range:
          type: number
          format: float

    VisualCameraDefault:
      type: object
      description: Default camera pose for the scene.
      properties:
        position:
          type: array
          items:
            type: number
            format: float
          minItems: 3
          maxItems: 3
        target:
          type: array
          items:
            type: number
            format: float
          minItems: 3
          maxItems: 3

    VisualManifest:
      type: object
      description: >
        Optional companion document to a PacData file that carries visual /
        rendering properties. Persisted as <projectId>.visual_manifest.json
        alongside the .pacdata.json sidecar. Not required for headless runs.
      required: [visual_version, environment]
      properties:
        visual_version:
          type: string
          description: visual_manifest schema version (currently "1.0.0")
        pacdata_version:
          type: string
          description: PacData format version this manifest was authored for
        environment:
          $ref: "#/components/schemas/VisualEnvironment"
        global_illumination:
          $ref: "#/components/schemas/VisualGI"
        entities:
          type: array
          items:
            $ref: "#/components/schemas/VisualEntityOverride"
          description: Per-entity visual overrides keyed by integer slot index
        static_meshes:
          type: array
          items:
            $ref: "#/components/schemas/VisualStaticMesh"
        lights:
          type: array
          items:
            $ref: "#/components/schemas/VisualLight"
        post_processing:
          $ref: "#/components/schemas/VisualPostProcessing"
        camera_default:
          $ref: "#/components/schemas/VisualCameraDefault"

    # ── Import request schemas ──────────────────────────────────────────────

    ImportProjectRequest:
      type: object
      properties:
        name:
          type: string
          description: Filename (without extension). Sanitized to a-z0-9-_
        rawJson:
          type: string
          description: Raw PacData document text
      required: [name, rawJson]

    ImportPacExportRequest:
      type: object
      description: >
        Imports a .pacexport package as a new project. worldPacdataJson is the
        raw world.pacdata.json text. visualManifestJson is the optional
        visual_manifest.json text. If omitted the project is created without
        visual properties.
      properties:
        name:
          type: string
          description: Desired project name (sanitized to a-z0-9-_)
        worldPacdataJson:
          type: string
          description: Raw text of world.pacdata.json from the package
        visualManifestJson:
          type: string
          description: Optional raw text of visual_manifest.json
      required: [name, worldPacdataJson]

    ImportedProject:
      type: object
      properties:
        project:
          $ref: "#/components/schemas/ProjectSummary"
      required: [project]

    InstantiateTemplateRequest:
      type: object
      properties:
        name:
          type: string
      required: [name]

    RunRequest:
      type: object
      properties:
        ticks:
          type: integer
          minimum: 1
          maximum: 5000
      required: [ticks]

    RunArtifacts:
      type: object
      properties:
        durationMs:
          type: integer
        eventLines:
          type: array
          items:
            type: string
        eventLineCount:
          type: integer
        traceBytes:
          type: integer
        traceSha256:
          type: string
        eventLogSha256:
          type: string
      required:
        - durationMs
        - eventLines
        - eventLineCount
        - traceBytes
        - traceSha256
        - eventLogSha256

    RunResult:
      type: object
      properties:
        runId:
          type: string
          description: Identifier of the persisted run; usable with /pacengine/runs/{runId}/frames
        projectId:
          type: string
        ticks:
          type: integer
        run:
          $ref: "#/components/schemas/RunArtifacts"
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
      required: [runId, projectId, ticks, run, startedAt, completedAt]

    DeterminismDiffLine:
      type: object
      properties:
        index:
          type: integer
        runA:
          type: string
        runB:
          type: string
      required: [index, runA, runB]

    DeterminismCheckResult:
      type: object
      properties:
        projectId:
          type: string
        ticks:
          type: integer
        runAId:
          type: string
        runBId:
          type: string
        runA:
          $ref: "#/components/schemas/RunArtifacts"
        runB:
          $ref: "#/components/schemas/RunArtifacts"
        eventsMatch:
          type: boolean
        traceMatch:
          type: boolean
        diffLines:
          type: array
          items:
            $ref: "#/components/schemas/DeterminismDiffLine"
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
      required:
        - projectId
        - ticks
        - runAId
        - runBId
        - runA
        - runB
        - eventsMatch
        - traceMatch
        - diffLines
        - startedAt
        - completedAt

    RunMetadata:
      type: object
      properties:
        runId:
          type: string
        projectId:
          type: string
        ticks:
          type: integer
        traceVersion:
          type: integer
          description: 1 = legacy, 2 = trace v2 framed format
        traceBytes:
          type: integer
        traceSha256:
          type: string
        eventLogSha256:
          type: string
        completedAt:
          type: string
          format: date-time
      required:
        - runId
        - projectId
        - ticks
        - traceVersion
        - traceBytes
        - traceSha256
        - completedAt

    PositionValue:
      type: object
      properties:
        x:
          type: number
          format: double
        y:
          type: number
          format: double
        z:
          type: number
          format: double
      required: [x, y, z]

    EntityFrame:
      type: object
      properties:
        index:
          type: integer
          description: Slot index of EntityId
        generation:
          type: integer
        pacId:
          type: string
        type:
          type: string
        position:
          $ref: "#/components/schemas/PositionValue"
      required: [index, generation]

    TraceFrame:
      type: object
      properties:
        tick:
          type: integer
        entities:
          type: array
          items:
            $ref: "#/components/schemas/EntityFrame"
        events:
          type: array
          items:
            type: string
      required: [tick, entities, events]

    RunFramesResponse:
      type: object
      properties:
        runId:
          type: string
        from:
          type: integer
        to:
          type: integer
        totalFrames:
          type: integer
        frames:
          type: array
          items:
            $ref: "#/components/schemas/TraceFrame"
      required: [runId, from, to, totalFrames, frames]

    TraceDiffEntry:
      type: object
      properties:
        tick:
          type: integer
        kind:
          type: string
          enum: [entity_added, entity_removed, entity_changed, event_diff, frame_size_diff]
        detail:
          type: string
      required: [tick, kind, detail]

    TraceDiffResponse:
      type: object
      properties:
        runAId:
          type: string
        runBId:
          type: string
        identical:
          type: boolean
        firstDivergenceTick:
          type: integer
          nullable: true
        entries:
          type: array
          items:
            $ref: "#/components/schemas/TraceDiffEntry"
      required: [runAId, runBId, identical, entries]

    VersionBucket:
      type: object
      properties:
        version:
          type: string
        count:
          type: integer
      required: [version, count]

    WorkspaceStats:
      type: object
      properties:
        projectCount:
          type: integer
        totalEntities:
          type: integer
        totalAgents:
          type: integer
        totalScenarios:
          type: integer
        conflictSimEnabledCount:
          type: integer
        templateCount:
          type: integer
        byPacdataVersion:
          type: array
          items:
            $ref: "#/components/schemas/VersionBucket"
        byPaccoreVersion:
          type: array
          items:
            $ref: "#/components/schemas/VersionBucket"
      required:
        - projectCount
        - totalEntities
        - totalAgents
        - totalScenarios
        - conflictSimEnabledCount
        - templateCount
        - byPacdataVersion
        - byPaccoreVersion

    EngineInfo:
      type: object
      properties:
        binaryAvailable:
          type: boolean
        binaryPath:
          type: string
        engineVersion:
          type: string
          description: From pacengine version constant or roadmap milestone.
        pacdataVersion:
          type: string
        paccoreVersion:
          type: string
      required:
        - binaryAvailable
        - binaryPath
        - engineVersion
        - pacdataVersion
        - paccoreVersion
